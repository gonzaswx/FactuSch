{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="page-title mb-1">Resetear contraseña</h1>
        <p class="page-subtitle mb-0">
            {{ school.name }}
        </p>
    </div>

    <a href="/schools/" class="btn btn-secondary">
        Volver
    </a>
</div>

<div class="card app-card">
    <div class="card-body">

        {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
        {% endif %}

        <div class="alert alert-info">
            Usuario de la escuela:
            <strong>{{ school_user.email }}</strong>
        </div>

        <form method="post" action="/schools/{{ school.id }}/reset-password">

            <div class="mb-3">
                <label class="form-label">Nueva contraseña</label>
                <input
                    type="text"
                    name="password"
                    class="form-control"
                    required
                >
                <small class="text-muted">
                    La escuela podrá iniciar sesión con esta nueva contraseña.
                </small>
            </div>

            <button type="submit" class="btn btn-warning">
                Resetear contraseña
            </button>

            <a href="/schools/" class="btn btn-secondary">
                Cancelar
            </a>

        </form>

    </div>
</div>

{% endblock %}
