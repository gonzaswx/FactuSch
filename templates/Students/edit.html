{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="page-title mb-1">Editar alumno</h1>
        <p class="page-subtitle mb-0">{{ school.name }} · {{ student.full_name }}</p>
    </div>

    <a href="/schools/{{ school.id }}/students" class="btn btn-secondary">
        Volver
    </a>
</div>

<div class="card app-card">
    <div class="card-body">

        {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
        {% endif %}

        <form method="post" action="/schools/{{ school.id }}/students/{{ student.id }}/edit">

            <h5 class="mb-3">Datos del alumno</h5>

            <div class="mb-3">
                <label class="form-label">Nombre completo del alumno</label>
                <input type="text" name="full_name" class="form-control" value="{{ student.full_name }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">DNI del alumno</label>
                <input type="text" name="dni" class="form-control" value="{{ student.dni }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email del responsable</label>
                <input type="email" name="email" class="form-control" value="{{ student.email or '' }}">
            </div>

            <hr class="my-4">

            <h5 class="mb-3">Nivel y cuota</h5>

            <div class="mb-3">
                <label class="form-label">Nivel</label>
                <select name="level_id" class="form-select">
                    <option value="">Sin nivel</option>

                    {% for level in levels %}
                        <option value="{{ level.id }}" {% if student.level_id == level.id %}selected{% endif %}>
                            {{ level.name }} - $ {{ "%.2f"|format(level.monthly_fee or 0) }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Cuota personalizada</label>
                <input
                    type="number"
                    name="monthly_fee"
                    step="0.01"
                    min="0"
                    class="form-control"
                    value="{{ student.monthly_fee or 0 }}"
                >
                <small class="text-muted">
                    Dejá 0 para usar la cuota del nivel.
                </small>
            </div>

            <hr class="my-4">

            <h5 class="mb-3">Curso y tutor</h5>

            <div class="mb-3">
                <label class="form-label">Curso</label>
                <input type="text" name="course" class="form-control" value="{{ student.course or '' }}">
            </div>

            <div class="mb-3">
                <label class="form-label">División</label>
                <input type="text" name="division" class="form-control" value="{{ student.division or '' }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Nombre del tutor</label>
                <input type="text" name="guardian_name" class="form-control" value="{{ student.guardian_name or '' }}">
            </div>

            <div class="mb-3">
                <label class="form-label">DNI del tutor</label>
                <input type="text" name="guardian_dni" class="form-control" value="{{ student.guardian_dni or '' }}">
            </div>

            <button type="submit" class="btn btn-primary">
                Guardar cambios
            </button>

            <a href="/schools/{{ school.id }}/students" class="btn btn-secondary">
                Cancelar
            </a>

        </form>

    </div>
</div>

{% endblock %}
